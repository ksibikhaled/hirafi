name: hirafi_frontend
description: "Hirafi - Artisan Service Platform Frontend"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.1
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  font_awesome_flutter: 10.6.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.5
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3
  flutter_svg: ^2.0.10+1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
